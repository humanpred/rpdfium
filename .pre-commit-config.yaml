# pdfium R package — pre-commit configuration.
#
# Setup (once per clone):
#   pip install --user pre-commit
#   pre-commit install
#   pre-commit install --hook-type pre-push
#
# `pre-commit` stage runs on every `git commit` and is kept fast.
# `pre-push` stage runs longer checks (roxygen regen, full lint, parallel
# tests) before changes leave the developer's machine.
#
# CI (.github/workflows/pre-commit.yaml) re-runs the full configuration on
# pull requests so contributors who skipped local install are still caught.

repos:
  - repo: https://github.com/lorenzwalthert/precommit
    rev: v0.4.3
    hooks:
      - id: parsable-R
      - id: no-browser-statement
      - id: no-debug-statement
      - id: no-print-statement
      - id: deps-in-desc
      - id: codemeta-description-updated
      - id: lintr
        args: [--warn_only]
      - id: style-files
        args: [--style_pkg=styler, --style_fun=tidyverse_style]
      - id: spell-check
        exclude: >
          (?x)^(
            (.*/|)\.gitignore|
            (.*/|)\.Rbuildignore|
            (.*/|)\.lintr|
            (.*/|)NAMESPACE|
            (.*/|)WORDLIST|
            (.*/|)\.Rprofile|
            (.*/|)Makefile|
            (.*/|)DESCRIPTION|
            (.*/|).*\.Rd|
            (.*/|).*\.svg|
            (.*/|).*\.png|
            (.*/|).*\.jpg|
            (.*/|).*\.gz|
            (.*/|).*\.pdf|
            tools/.*|
            inst/.*|
            dev/.*\.md|
            cran-comments\.md|
            LICENSE|
            LICENSE\.md|
            NEWS\.md
          )$
      - id: readme-rmd-rendered
      - id: use-tidy-description

      # `pre-push` stage: heavier checks, only on push.
      - id: roxygenize
        stages: [pre-push]
      - id: lintr
        name: "lintr (full)"
        stages: [pre-push]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=200]
        exclude: >
          (?x)^(
            inst/extdata/fixtures/.*\.pdf
          )$
      - id: check-yaml
      - id: check-merge-conflict
      - id: end-of-file-fixer
        # Skip files we don't author by hand:
        #   *.Rd                       roxygen-generated
        #   RcppExports.{R,cpp}        Rcpp::compileAttributes()-generated
        #   dev/upstream-patches/*.patch
        #     git format-patch artifacts whose byte content must round-
        #     trip through `git am`; stripping the trailing newline or
        #     the "-- " signature delimiter breaks the patch.
        exclude: >
          (?x)^(
            .*\.Rd|
            R/RcppExports\.R|
            src/RcppExports\.cpp|
            dev/upstream-patches/.*\.patch
          )$
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: trailing-whitespace
        exclude: >
          (?x)^(
            .*\.Rd|
            R/RcppExports\.R|
            src/RcppExports\.cpp|
            dev/upstream-patches/.*\.patch
          )$

  # Local hooks (no remote repo dependency).
  - repo: local
    hooks:
      - id: pkgdown-reference-check
        name: pkgdown reference index covers all NAMESPACE exports
        description: >
          Fails when _pkgdown.yml's reference: section is out of sync
          with NAMESPACE - missing exports or stale entries. Catches
          the same class of drift as `pkgdown::check_pkgdown()` but
          without invoking pkgdown's full build pipeline (no
          dependency installs, no model rendering, < 1 s wall time).
        entry: Rscript tools/check-pkgdown-reference.R
        language: system
        pass_filenames: false
        files: '^(_pkgdown\.yml|NAMESPACE|R/.*\.R)$'

      - id: rd-xref-check
        name: Rd cross-reference resolution
        description: >
          Catches \link{} targets in man/*.Rd that don't resolve to
          either a topic in this package, a documented dependency, or
          one of the base / recommended packages. This is the same
          WARNING that `R CMD check --as-cran` emits under "checking
          Rd cross-references" and that fails every platform of the
          cross-platform R-CMD-check matrix. Uses the same internal R
          function (tools:::.check_Rd_xrefs) R CMD check itself uses;
          operates on the source tree without needing the package
          installed - fast enough for every commit.
        entry: Rscript tools/check-rd-xrefs.R
        language: system
        pass_filenames: false
        files: '^(R/.*\.R|man/.*\.Rd|DESCRIPTION)$'

  # Conventional Commits message check (server side: defense in depth via CI).
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, chore, test, refactor, perf, ci, build, style, revert]
