# coverage.yaml — R-line coverage with covr → codecov. Gated at 100%.
#
# C++ coverage tracked separately in cpp-asan / valgrind; not gated here.
# The gate is enforced by codecov.yml (project + patch target 100%).

name: coverage

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr, any::xml2
          needs: coverage

      - name: Generate coverage
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"), "package")
          )
          covr::to_cobertura(cov, "coverage.xml")
          print(cov)
        shell: Rscript {0}

      - uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          flags: r
          plugin: noop
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
