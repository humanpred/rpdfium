# coverage.yaml — R-line coverage with covr → codecov. Gated at 100%.
#
# C++ coverage tracked separately in cpp-asan / valgrind; not gated here.
# The gate is enforced by codecov.yml (project + patch target 100%).

name: coverage

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr, any::xml2
          needs: coverage

      - name: Generate coverage
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"), "package")
          )
          covr::to_cobertura(cov, "coverage.xml")
          print(cov)
          # Hard R-side gate: fail this workflow if R coverage drops below 100%.
          # codecov.io enforces the same threshold for downstream consumers but
          # requires CODECOV_TOKEN to do so on protected branches, so we keep
          # the gate authoritative here regardless of upload status.
          #
          # Compute the gate from `as.data.frame(cov)` rather than via
          # `cov[boolean, ]`: as.data.frame.coverage expands each trace
          # entry to one row per source line, so the data-frame row count
          # exceeds the underlying entry count and the boolean misaligns
          # when used as a `[` subscript against the coverage object - it
          # pulls in non-R entries and silently inflates the denominator.
          # The data-frame aggregation below is what
          # `covr::percent_coverage(cov)` does internally, narrowed to R
          # files we own.
          df <- as.data.frame(cov)
          r_files <- grep("^R/", unique(df$filename), value = TRUE)
          r_files <- setdiff(r_files, c("R/RcppExports.R", "R/zzz.R", "R/pdfium-package.R"))
          r_rows <- df[df$filename %in% r_files, ]
          r_pct  <- 100 * sum(r_rows$value > 0) / nrow(r_rows)
          cat(sprintf("R-only coverage (gated files): %.2f%%\n", r_pct))
          if (r_pct < 100) {
            stop(sprintf("R coverage gate: %.2f%% < 100%%", r_pct), call. = FALSE)
          }
        shell: Rscript {0}

      - name: Upload to codecov
        # The R-side gate above is authoritative. codecov upload is best-effort:
        # protected branches require CODECOV_TOKEN to upload, and we don't want
        # a missing token to fail a PR. Set CODECOV_TOKEN in repo secrets to
        # turn the upload into a hard gate again.
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          flags: r
          plugin: noop
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
