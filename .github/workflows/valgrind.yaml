# valgrind.yaml — weekly leak / memory-error check on Linux.
#
# Reminder: testthat parallelism does NOT compose with valgrind. We run
# tests serially here by overriding Config/testthat/parallel via the
# `TESTTHAT_PARALLEL` env var. Definite leaks fail the run.

name: valgrind

on:
  schedule:
    - cron: '23 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  valgrind:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      TESTTHAT_PARALLEL: 'false'
    steps:
      - uses: actions/checkout@v6

      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends valgrind

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::testthat, any::rcmdcheck, local::.
          needs: check

      - name: Install package
        run: R CMD INSTALL .

      - name: Run tests under valgrind
        # Same rationale as cpp-asan.yaml: load the installed package
        # via library(pdfium) so RPATH resolves to <pkg>/lib/libpdfium.so
        # at the normal location, rather than letting testthat::test_dir
        # pkgload-copy the DLL into a tempdir where the relative RPATH
        # cannot resolve. Run from `tests/` so test_check finds the
        # adjacent `testthat/` directory (mirrors R CMD check).
        #
        # `--error-exitcode=0` lets the R process complete even when
        # valgrind reports memory-access errors; the next step gates
        # the job on the leak summary instead. Rationale: the bundled
        # bblanchon PDFium binary triggers ~150k Memcheck `Cond` /
        # `Value` errors from its compiled SIMD / fastpaths (reads
        # well-defined at the hardware level but with uninitialized
        # lanes that Memcheck flags). Those are neither leaks nor
        # code we control. CRAN's own valgrind check focuses on
        # leaks; we follow the same policy.
        working-directory: tests
        run: |
          R -d "valgrind --tool=memcheck --leak-check=full --error-exitcode=0 --log-file=$RUNNER_TEMP/valgrind.log" \
            --no-echo --vanilla -f testthat.R

      - name: Fail on definite or indirect leaks
        # CRAN's valgrind reject criterion is "definitely lost" or
        # "indirectly lost" memory. "Possibly lost" and "still
        # reachable" are routine on shutdown and ignored. We print
        # the full leak summary either way so the log is reviewable.
        run: |
          log="$RUNNER_TEMP/valgrind.log"
          if [ ! -s "$log" ]; then
            echo "ERROR: valgrind log not found or empty at $log"
            exit 1
          fi
          echo "=== valgrind leak summary ==="
          grep -E "(definitely|indirectly|possibly|still reachable|suppressed) lost:" "$log" || true
          echo
          # Pull the numeric byte counts from the LEAK SUMMARY block.
          # Format example: "    definitely lost: 0 bytes in 0 blocks"
          definite=$(grep -E "definitely lost: " "$log" | tail -1 | sed -E 's/.*definitely lost: ([0-9,]+) bytes.*/\1/' | tr -d ',')
          indirect=$(grep -E "indirectly lost: " "$log" | tail -1 | sed -E 's/.*indirectly lost: ([0-9,]+) bytes.*/\1/' | tr -d ',')
          if [ -z "$definite" ] || [ -z "$indirect" ]; then
            echo "ERROR: could not parse leak summary from $log"
            tail -200 "$log"
            exit 1
          fi
          if [ "$definite" -gt 0 ] || [ "$indirect" -gt 0 ]; then
            echo "FAIL: definitely=$definite indirectly=$indirect bytes lost"
            exit 1
          fi
          echo "OK: definitely=$definite indirectly=$indirect bytes lost"

      - name: Upload valgrind log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-log
          path: ${{ runner.temp }}/valgrind.log
          if-no-files-found: ignore
          retention-days: 14
