# cpp-asan.yaml — AddressSanitizer + UBSan build on Linux.
#
# Advisory: does not gate the PR yet. Surfaces undefined behaviour or
# memory errors in the Rcpp glue / PDFium interop that valgrind might miss.

name: cpp-asan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  asan-ubsan:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      ASAN_OPTIONS: 'halt_on_error=1:abort_on_error=1:detect_leaks=0'
      UBSAN_OPTIONS: 'print_stacktrace=1:halt_on_error=1'
      CXXFLAGS: '-O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer'
      LDFLAGS:  '-fsanitize=address,undefined'
    steps:
      - uses: actions/checkout@v6
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::testthat, local::.
          needs: check
      - name: Install package
        run: R CMD INSTALL .
      - name: Run tests with sanitizers
        run: Rscript -e 'testthat::test_dir("tests/testthat", parallel = FALSE)'
