# pre-commit.yaml — run non-renv pre-commit hooks on PRs.
#
# The lorenzwalthert/precommit `language: r` hooks (lintr, styler,
# parsable-R, roxygenize, deps-in-desc, etc.) each spawn their own
# renv to install R packages from source. On a fresh GitHub Actions
# runner this is slow and fragile (we have observed package-compile
# failures in the renv environment).
#
# CI coverage of those checks comes from the dedicated lint.yaml
# workflow (which uses the same lintr config) plus R-CMD-check (which
# catches roxygen drift, deps-in-desc misses, etc.). This workflow
# runs the fast non-renv hooks - yaml validity, line endings,
# trailing whitespace, large-file guard, conventional commit message
# format, plus our local pkgdown reference-index validator (which
# uses `language: system` so it just shells out to Rscript against
# the runner's R install, no renv involved).
#
# Local-dev workflow is unchanged: `pre-commit install` runs the
# full configuration in .pre-commit-config.yaml.

name: pre-commit

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  # Hook IDs from .pre-commit-config.yaml that use the R language and pull
  # in renv. Keep this list in sync with the R-backed hooks defined there.
  # Must be a single comma-separated string with no whitespace.
  SKIP: parsable-R,no-browser-statement,no-debug-statement,no-print-statement,deps-in-desc,codemeta-description-updated,lintr,style-files,spell-check,readme-rmd-rendered,use-tidy-description,roxygenize

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      # R + the `yaml` package are needed for the
      # pkgdown-reference-check local hook below; everything else in
      # this workflow runs without R.
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: any::yaml
      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files --show-diff-on-failure
