# pre-commit.yaml — run the full pre-commit configuration on PRs.
#
# Defense in depth: catches contributors who didn't install
# `pre-commit` locally. Re-runs every hook in
# `.pre-commit-config.yaml` against all files.

name: pre-commit

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::styler
            any::lintr
            any::roxygen2
            any::desc
            local::.
          needs: |
            check
            coverage
      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files --show-diff-on-failure
