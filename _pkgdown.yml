  - title: Structural mutation
    desc: >
      Open a document with `readwrite = TRUE` (or build one with
      `pdf_doc_new()`) to enable these. See ADRs 011-018 for the
      writer-surface conventions.
    contents:
      - pdf_page_new
      - pdf_page_delete
      - pdf_pages_reorder
      - pdf_docs_merge
      - pdf_n_up
      - pdf_page_set_rotation
      - pdf_page_set_box
      - pdf_doc_set_language
      - pdf_page_flush
  - title: Page-object styling
    desc: >
      Setters for page-object attributes. Each takes a `pdfium_obj`
      handle from `pdf_page_objects()` (parent doc must be readwrite)
      and marks the parent page dirty so `pdf_save()` /
      `pdf_render_*()` see the change.
    contents:
      - pdf_obj_set_matrix
      - pdf_obj_set_active
      - pdf_obj_set_blend_mode
      - pdf_path_set_stroke
      - pdf_path_set_fill
      - pdf_path_set_line_cap
      - pdf_path_set_line_join
      - pdf_path_set_dash
      - pdf_path_set_draw_mode
      - pdf_text_set_content
      - pdf_text_set_render_mode
      - pdf_obj_add_mark
      - pdf_obj_remove_mark
  - title: Path geometry
    desc: >
      Appenders for path page-objects. PDFium's public API is
      append-only — there is no segment-removal or -replacement
      symbol. Compose with `pdf_path_new()` and `pdf_obj_delete()`
      below for the full read → edit → write workflow.
    contents:
      - pdf_path_move_to
      - pdf_path_line_to
      - pdf_path_bezier_to
      - pdf_path_close
      - pdf_path_append
  - title: Page-object creation
    desc: >
      Create fresh page-objects (paths, rectangles, text) on a page
      that's been opened with `readwrite = TRUE` or built via
      `pdf_doc_new()`. Image creation is deferred to a later release
      pending FPDF_BITMAP plumbing. Use `pdf_obj_delete()` for the
      inverse — remove + destroy a page-object.
    contents:
      - pdf_path_new
      - pdf_rect_new
      - pdf_text_new
      - pdf_obj_delete
  - title: Annotation authoring
    desc: >
      Create / delete annotations and mutate their properties.
      Mirrors the `pdf_annot_*` readers; each setter takes a
      `pdfium_annot` whose parent doc is readwrite. PDFium supports
      creating these subtypes: circle, fileattachment, freetext,
      highlight, ink, link, popup, square, squiggly, stamp,
      strikeout, text, underline.
    contents:
      - pdf_annot_new
      - pdf_annot_delete
      - pdf_annot_set_bounds
      - pdf_annot_set_color
      - pdf_annot_set_interior_color
      - pdf_annot_set_flags
      - pdf_annot_set_contents
      - pdf_annot_set_title
      - pdf_annot_set_subject
      - pdf_annot_set_dict_value
      - pdf_annot_append_quad
  - title: Form filling
    desc: >
      Write `/V` (the field value) on AcroForm widget annotations
      and flatten the page when the form-fill workflow finishes.
      `pdf_form_field_set_value()` dispatches by the field's type:
      character for text / choice fields, logical-or-character for
      checkable fields. `pdf_page_flatten()` bakes both form widgets
      and annotations into the page's content stream — irreversible
      and intended as the final step before saving a non-editable
      copy.
    contents:
      - pdf_form_field_set_value
      - pdf_form_field_clear
      - pdf_form_reset
      - pdf_page_flatten
