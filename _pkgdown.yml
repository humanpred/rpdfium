# pdfium pkgdown configuration.
#
# Hand-written developer content (ADRs, surveys, architecture
# notes) lives under `dev/` so that pkgdown can use the
# conventional `docs/` output directory without colliding with
# anything tracked in source control. `dev/` is excluded from the
# package source tarball via .Rbuildignore.

url: https://humanpred.github.io/rpdfium/
title: pdfium

template:
  bootstrap: 5

development:
  mode: auto

home:
  links:
    - text: Project plan
      href: https://github.com/humanpred/rpdfium/blob/main/dev/architecture.md
    - text: Decision records
      href: https://github.com/humanpred/rpdfium/tree/main/dev/decisions

reference:
  - title: Documents
    contents:
      - pdf_open
      - pdf_close
      - pdf_page_count
      - pdf_doc_info
      - pdf_doc_meta
      - pdf_parse_date
      - pdf_doc_permissions
      - pdf_bookmarks
      - pdf_page_label
      - pdf_page_labels
  - title: Pages
    contents:
      - pdf_load_page
      - pdf_close_page
      - pdf_page_size
      - pdf_page_rotation
  - title: Annotations and form fields
    contents:
      - pdf_annotations
      - pdf_form_fields
  - title: Page objects
    contents:
      - pdf_page_objects
      - pdf_obj_type
      - pdf_obj_bounds
      - pdf_obj_matrix
  - title: Paths
    contents:
      - pdf_path_segments
      - pdf_path_stroke
      - pdf_path_fill
      - pdf_path_dash
  - title: Text
    contents:
      - pdf_text_font_size
      - pdf_text_content
      - pdf_text_runs
      - pdf_text_font
  - title: Rendering
    contents:
      - pdf_render_page
      - pdf_render_to_png
      - plot.pdfium_bitmap
      - as.raster.pdfium_bitmap
      - as.array.pdfium_bitmap
      - as.matrix.pdfium_bitmap
  - title: Images
    contents:
      - pdf_image_info
      - pdf_image_size
      - pdf_image_bitmap
      - pdf_image_rendered
      - pdf_image_data
      - pdf_image_filters
  - title: Form XObjects
    contents:
      - pdf_form_objects
  - title: Clip paths
    contents:
      - pdf_obj_clip_path
      - pdf_clip_path_count
      - pdf_clip_path_segments
  - title: One-call extraction
    contents:
      - pdf_extract_paths
